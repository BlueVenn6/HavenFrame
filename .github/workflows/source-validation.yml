name: Source validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: source-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      LIVE_COSTLY_MODEL_TESTS: "0"
      QIGOU_API_PROFILE: desktop_client
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Install Python dependency auditor
        run: python -m pip install pip-audit==2.10.1
      - name: Install desktop frontend dependencies
        working-directory: app
        run: npm ci
      - name: Backend tests
        run: python -m pytest backend/tests -q
      - name: Python dependency consistency
        run: python -m pip check
      - name: Python dependency audit
        run: python -m pip_audit -r backend/requirements.txt --progress-spinner off
      - name: Desktop dependency audit
        working-directory: app
        run: npm audit --audit-level=high
      - name: Desktop source validation
        working-directory: app
        run: |
          npm run typecheck
          npm run test:i18n
          npm run test:model-routing
          npm run test:model-selection-runtime
          npm run test:independent-board-workflows
          npm run test:workflow-history
          npm run build
      - name: Tauri source validation
        shell: pwsh
        run: |
          # Tauri validates externalBin paths before cargo check. Release sidecars
          # are intentionally built only on authorized local machines, so CI uses
          # an untracked empty path placeholder for config parsing only.
          $placeholder = "app/src-tauri/binaries/qigou-backend-sidecar-x86_64-pc-windows-msvc.exe"
          New-Item -ItemType Directory -Force -Path (Split-Path $placeholder) | Out-Null
          New-Item -ItemType File -Force -Path $placeholder | Out-Null
          cargo check --locked --manifest-path app/src-tauri/Cargo.toml
      - name: Secret scan
        run: python scripts/secret_scan.py --json

      # Windows installers are intentionally excluded. Release artifacts are
      # built and verified only on authorized local machines.
