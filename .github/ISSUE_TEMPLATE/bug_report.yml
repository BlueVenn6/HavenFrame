name: Bug report / 缺陷报告
description: Report a reproducible HavenFrame defect without sharing private data. / 提交可复现且已脱敏的问题。
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not upload API keys, customer images, databases, full logs, signing files, or reusable credentials. Redact local usernames and paths.
        请勿上传 API Key、客户图片、数据库、完整日志、签名文件或可复用凭据；请脱敏本机用户名和路径。
  - type: input
    id: version
    attributes:
      label: Version and platform / 版本与平台
      description: Include the visible version, Windows architecture, and artifact SHA-256 when available.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps / 复现步骤
      description: List the exact workflow and actions.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result / 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result / 实际结果
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider path / Provider 线路
      options:
        - Not applicable
        - OpenAI Native
        - OpenAI-compatible Relay
        - Google Gemini
        - Zhipu GLM Mainland China
        - Z.AI GLM International
        - Compatible vision relay
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation / 隐私确认
      options:
        - label: I removed API keys, credentials, customer materials, databases, and private paths. / 我已移除 API Key、凭据、客户素材、数据库和私有路径。
          required: true
